    <line x1="246" y1="235" x2="266" y2="235" />
    <line x1="246" y1="265" x2="266" y2="265" />
    <line x1="246" y1="295" x2="266" y2="295" />
    <line x1="246" y1="325" x2="266" y2="325" />
    <line x1="246" y1="355" x2="266" y2="355" />
    <line x1="246" y1="385" x2="266" y2="385" />
